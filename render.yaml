services:
  - type: web
    name: sigmachat
    runtime: node
    plan: starter
    # --include=dev is required: NODE_ENV=production (below) makes npm skip
    # devDependencies, but the build needs typescript/tailwindcss/postcss/@types
    # (all devDeps). Without them Next can't read the tsconfig "@/" path alias
    # → "Module not found: @/...". Installing dev deps fixes the build.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # ---- Chat source API (Shopee/TikTok proxy) + webhook HMAC secret ----
      - key: CHAT_API_BASE_URL
        value: https://api-center.shd-technology.co.th
      - key: CHAT_API_KEY
        sync: false
      # Shared secret for the scheduled sync endpoint (/api/cron/sync)
      - key: CRON_SECRET
        sync: false
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: META_VERIFY_TOKEN
        sync: false
      - key: META_PAGE_ACCESS_TOKEN
        sync: false
