services:
  - type: web
    name: sigmachat
    runtime: node
    plan: standard   # 2GB / 1 CPU, always-on (upgraded from starter 2026-07-08)
    # --include=dev is required: NODE_ENV=production (below) makes npm skip
    # devDependencies, but the build needs typescript/tailwindcss/postcss/@types
    # (all devDeps). Without them Next can't read the tsconfig "@/" path alias
    # → "Module not found: @/...". Installing dev deps fixes the build.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # ---- Chat source API (Shopee/TikTok proxy) + webhook HMAC secret ----
      - key: CHAT_API_BASE_URL
        value: https://api-center.shd-technology.co.th
      - key: CHAT_API_KEY
        sync: false
      # Shared secret for the scheduled sync endpoint (/api/cron/sync)
      - key: CRON_SECRET
        sync: false
      # GLOBAL KILL-SWITCH for AI auto-reply to real customers. Default OFF:
      # Nexus is human-reply-only (AI only drafts; a person reviews + sends).
      # Set to "true" ONLY if you ever want webhook channels to auto-respond.
      - key: AI_AUTOREPLY_ENABLED
        value: "false"
      - key: LLM_PROVIDER
        value: deepseek      # deepseek | openai | anthropic | mock (auto-detects a set key if mock)
      - key: LLM_MODEL
        value: deepseek-chat
      - key: DEEPSEEK_API_KEY
        sync: false          # ← paste the DeepSeek key in the Render dashboard (not committed)
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # ---- Vision (reads customer-sent images for the AI draft) ----
      - key: GEMINI_API_KEY
        sync: false          # ← paste the Gemini API key in the Render dashboard (not committed)
      - key: GEMINI_MODEL
        value: gemini-flash-lite-latest   # 2.0-flash was deprecated (404); lite = cheap + reads spec images well
      # ---- Tutorial-video finder (AI draft suggests a real how-to clip) ----
      # KB-curated YouTube links are used first; this key enables real YouTube
      # search as the fallback. Without it, only KB links are offered (no guessing).
      - key: YOUTUBE_API_KEY
        sync: false          # ← paste a YouTube Data API v3 key in the Render dashboard (not committed)
      # ---- Warehouse stock (#6) — BigQuery Canonical.warehouse_inventory_current ----
      # Paste the FULL sa-consumer-sigmacha.json (single line) as the value. Read-only
      # SA; the app queries with maximumBytesBilled + 10-min cache. Never commit the key.
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
        sync: false
      # ---- Comment-reply feature (Shopee review comments) ----
      # Reads comments from the shopee-comment-ai Supabase project:
      - key: COMMENTS_SUPABASE_URL
        sync: false
      - key: COMMENTS_SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Posts replies via the Shopee Product API proxy (shopee_reply_comment scope):
      - key: SHOPEE_REPLY_API_URL
        value: https://datacenter.shd-technology.co.th/api/v1/shopee/reply-comment
      - key: SHOPEE_REPLY_API_KEY
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: META_VERIFY_TOKEN
        sync: false
      - key: META_PAGE_ACCESS_TOKEN
        sync: false
      # Multi-brand Facebook: ONE System-User token reads all pages (/me/accounts);
      # per-page tokens are derived on demand. Paste it in the Render dashboard.
      - key: META_SYSTEM_USER_TOKEN
        sync: false
