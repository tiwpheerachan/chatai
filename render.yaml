services:
  - type: web
    name: sigmachat
    runtime: node
    plan: standard   # 2GB / 1 CPU, always-on (upgraded from starter 2026-07-08)
    # --include=dev is required: NODE_ENV=production (below) makes npm skip
    # devDependencies, but the build needs typescript/tailwindcss/postcss/@types
    # (all devDeps). Without them Next can't read the tsconfig "@/" path alias
    # → "Module not found: @/...". Installing dev deps fixes the build.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # ---- Chat source API (Shopee/TikTok proxy) + webhook HMAC secret ----
      - key: CHAT_API_BASE_URL
        value: https://api-center.shd-technology.co.th
      - key: CHAT_API_KEY
        sync: false
      # Shared secret for the scheduled sync endpoint (/api/cron/sync)
      - key: CRON_SECRET
        sync: false
      - key: LLM_PROVIDER
        value: deepseek      # deepseek | openai | anthropic | mock (auto-detects a set key if mock)
      - key: LLM_MODEL
        value: deepseek-chat
      - key: DEEPSEEK_API_KEY
        sync: false          # ← paste the DeepSeek key in the Render dashboard (not committed)
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # ---- Vision (reads customer-sent images for the AI draft) ----
      - key: GEMINI_API_KEY
        sync: false          # ← paste the Gemini API key in the Render dashboard (not committed)
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: META_VERIFY_TOKEN
        sync: false
      - key: META_PAGE_ACCESS_TOKEN
        sync: false
